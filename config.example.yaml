# Overworld example config
#
# Copy this file to:
#   ~/.config/overworld/config.yaml
#
# Then customize project paths, runtimes, and shortcuts for your machine.

# Projects available for spawning.
projects:
  app:
    path: ~/code/my-app
    shortName: app
  api:
    path: ~/code/my-api
    shortName: api
  docs:
    path: ~/code/my-docs
    shortName: docs
  sandbox:
    path: ~/code/sandbox
    shortName: sbx

# Runtimes that can be launched inside a project directory.
runtimes:
  claude:
    command: ["claude"]
    label: Claude Code
  opencode:
    command: ["opencode"]
    label: OpenCode
  shell:
    command: ["bash"]
    label: Shell

# Quick-spawn buttons shown in the bottom bar.
shortcuts:
  - label: APP
    project: app
    runtime: opencode
    hotkeys: ["Ctrl+1"]
  - label: API
    project: api
    runtime: claude
    hotkeys: ["Ctrl+2"]
  - label: DOCS
    project: docs
    runtime: opencode
    hotkeys: ["Ctrl+3"]
  - label: SH
    project: sandbox
    runtime: shell
    hotkeys: ["Ctrl+4"]

# Optional shortcut with a command override and pinned avatar.
  - label: Tests
    project: app
    runtime: shell
    command: ["npm", "test", "--", "--watch"]
    hotkeys: ["Ctrl+T"]
    avatar: elder-wizard

# Optional project discovery rules.
discovery:
  - name: code-projects
    type: directories
    path: ~/code
    match: ".git"
    exclude: ["node_modules", ".cache", "dist"]
    maxDepth: 2
  - name: app-worktrees
    type: worktrees
    path: ~/code/my-app

# Backend runtime settings.
backend:
  tmux:
    sessionName: overworld
    pollIntervalMs: 2500

# Server bind settings.
server:
  host: 127.0.0.1
  port: 7600
