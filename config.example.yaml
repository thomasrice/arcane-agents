# Overworld example config

projects:
  personal-assistant:
    path: ~/code/personal-assistant
    shortName: pa
  labyrinth:
    path: ~/minotaur/labyrinth
    shortName: lab
  taurient:
    path: ~/minotaur/taurient
    shortName: taur
  obsidian:
    path: ~/ObsidianVault
    shortName: obs

runtimes:
  claude:
    command: ["claude", "--dangerously-skip-permissions"]
    label: Claude Code
  opencode:
    command: ["opencode"]
    label: OpenCode
  shell:
    command: ["bash"]
    label: Shell

shortcuts:
  - label: PA
    project: personal-assistant
    runtime: opencode
    hotkeys: ["Ctrl+A"]
  - label: Labyrinth
    project: labyrinth
    runtime: claude
    hotkeys: ["Ctrl+Shift+A"]
  - label: Taurient
    project: taurient
    runtime: opencode
    hotkeys: ["Ctrl+S"]
  - label: Obsidian
    project: obsidian
    runtime: opencode
  - label: Kairos
    project: taurient
    runtime: shell
    command: ["poetry", "run", "python", "chat.py", "-a", "kairos"]
    hotkeys: ["Ctrl+K"]
    avatar: elder-wizard

discovery:
  - name: code-projects
    type: directories
    path: ~/code
    match: ".git"
    exclude: ["node_modules", ".cache"]
    maxDepth: 1

backend:
  tmux:
    sessionName: overworld
    pollIntervalMs: 2500

server:
  host: 127.0.0.1
  port: 7600
