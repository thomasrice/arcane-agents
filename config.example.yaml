# Arcane Agents starter config
#
# Default location:
#   ~/.config/arcane-agents/config.yaml
#
# Helpful commands:
#   arcane-agents config path   # print config file locations
#   arcane-agents config show   # print current config
#   arcane-agents config edit   # open config in your editor
#
# Customize project paths, runtimes, and shortcuts for your machine.

# Minimal starter entries (safe defaults).
# Add your real projects and runtimes below.
projects:
  workspace:
    path: "~"
    shortName: ws
    label: Home

runtimes:
  shell:
    command: ["bash"]
    label: Shell

shortcuts:
  - label: SH
    project: workspace
    runtime: shell
    hotkeys: ["Ctrl+1"]

